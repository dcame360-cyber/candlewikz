# .github/workflows/post.yml
# candlewikz — automated crypto cards -> Instagram + X + Telegram.
# Two runs/day with a weekly card rotation (resolved in crypto_poster.py).
name: Daily crypto post

on:
  schedule:
    - cron: "30 13 * * *"     # 13:30 UTC  -> MORNING slot (am)
    - cron: "0 21 * * *"      # 21:00 UTC  -> EVENING slot (pm)
  workflow_dispatch:
    inputs:
      slot:
        description: "Which slot to run manually (am or pm)"
        required: false
        default: "am"

permissions:
  contents: write

concurrency:
  group: daily-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pillow

      # Decide am/pm: 21:00 cron = pm, everything else (13:30 cron or manual) uses the input/default.
      - name: Resolve slot
        id: slot
        run: |
          if [ "${{ github.event.schedule }}" = "0 21 * * *" ]; then
            echo "slot=pm" >> "$GITHUB_OUTPUT"
          else
            echo "slot=${{ github.event.inputs.slot || 'am' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Render card
        env:
          SLOT: ${{ steps.slot.outputs.slot }}   # script's rotation picks the card from day+slot
          BRAND_NAME: "candlewikz"
          GATE: "1"                              # anti-white-noise relevance gate ON
        run: python crypto_poster.py render

      - name: Commit rendered image
        run: |
          git config user.name  "github-actions"
          git config user.email "actions@github.com"
          git add output/latest.png output/caption.txt
          git commit -m "card: $(date -u +%FT%TZ)" || { echo "nothing to commit"; exit 0; }
          git push

      - name: Wait for raw CDN to update
        run: sleep 15

      - name: Publish to Instagram
        continue-on-error: true
        env:
          IG_USER_ID:      ${{ secrets.IG_USER_ID }}
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          IMAGE_URL: "https://raw.githubusercontent.com/${{ github.repository }}/${{ github.ref_name }}/output/latest.png"
        run: python crypto_poster.py post

      - name: Install X deps
        run: pip install requests pynacl

      - name: Post to X
        continue-on-error: true
        env:
          X_CLIENT_ID:     ${{ secrets.X_CLIENT_ID }}
          X_CLIENT_SECRET: ${{ secrets.X_CLIENT_SECRET }}
          X_REFRESH_TOKEN: ${{ secrets.X_REFRESH_TOKEN }}
          GH_PAT:          ${{ secrets.GH_PAT }}
        run: python x_poster.py

      - name: Post to Telegram
        continue-on-error: true
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID:   ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python telegram_poster.py
